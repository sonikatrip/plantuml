<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PlantUML Editor</title>
  <style>
    /* Your existing CSS here */
    body { font-family: sans-serif; margin: 0; }
    #sidebar, #editor, #preview, #properties, #relationship-form {
      padding: 1em; margin: 1em 0;
    }
    #container { display: flex; }
    #sidebar { width: 200px; background: #f4f4f4; }
    #main { flex: 1; display: flex; flex-direction: column; }
    #editor, #preview { height: 200px; }
    #properties { background: #f9f9f9; }
    #relationship-form { background: #eef; }
  </style>
</head>
<body>
  <div id="container">
    <div id="sidebar"></div>
    <div id="main">
      <div id="editor"></div>
      <div id="preview"></div>
      <div id="properties"></div>
      <div id="relationship-form"></div>
    </div>
  </div>
  <script>
    // Utility functions
    class Utils {
      static $(selector, parent=document) {
        return parent.querySelector(selector);
      }
      static on(el, event, handler) {
        el.addEventListener(event, handler);
      }
      static create(tag, attrs = {}, ...children) {
        const el = document.createElement(tag);
        for (let [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
        for (let child of children) el.append(child);
        return el;
      }
    }

    // Sidebar
    class Sidebar {
      constructor(container, onSelect) {
        this.container = container;
        this.onSelect = onSelect;
        this.render();
      }
      render() {
        this.container.innerHTML = '';
        const files = ['diagram1.puml', 'diagram2.puml'];
        const ul = Utils.create('ul');
        files.forEach(file => {
          const li = Utils.create('li', {}, file);
          Utils.on(li, 'click', () => this.onSelect(file));
          ul.appendChild(li);
        });
        this.container.appendChild(ul);
      }
    }

    // Editor Panel
    class EditorPanel {
      constructor(container, onChange) {
        this.container = container;
        this.onChange = onChange;
        this.render();
      }
      render() {
        this.textarea = Utils.create('textarea', { style: "width:100%;height:100px;" });
        Utils.on(this.textarea, 'input', () => this.onChange(this.textarea.value));
        this.container.appendChild(this.textarea);
      }
      setValue(text) {
        this.textarea.value = text;
      }
      getValue() {
        return this.textarea.value;
      }
    }

    // Preview Panel
    class PreviewPanel {
      constructor(container) {
        this.container = container;
        this.render();
      }
      render() {
        this.img = Utils.create('img', { style: "max-width:100%;max-height:100px;" });
        this.container.appendChild(this.img);
      }
      update(content) {
        // Dummy PlantUML image src
        this.img.src = 'https://via.placeholder.com/400x100?text=Preview';
      }
    }

    // Properties Pane
    class PropertiesPane {
      constructor(container) {
        this.container = container;
        this.render();
      }
      render() {
        this.container.innerHTML = '<strong>Properties:</strong> <span id="props-content">None</span>';
      }
      setProperties(props) {
        Utils.$('#props-content', this.container).textContent = props;
      }
    }

    // Relationship Form
    class RelationshipForm {
      constructor(container, onSubmit) {
        this.container = container;
        this.onSubmit = onSubmit;
        this.render();
      }
      render() {
        this.form = Utils.create('form', {},
          Utils.create('input', { type: 'text', placeholder: 'Relationship' }),
          Utils.create('button', { type: 'submit' }, 'Add')
        );
        Utils.on(this.form, 'submit', (e) => {
          e.preventDefault();
          this.onSubmit(this.form.elements[0].value);
        });
        this.container.appendChild(this.form);
      }
    }

    // Main App logic
    window.addEventListener('DOMContentLoaded', () => {
      const sidebar = new Sidebar(Utils.$('#sidebar'), (file) => {
        editor.setValue(`@startuml\n// ${file}\n@enduml`);
        properties.setProperties(`Selected: ${file}`);
      });

      const editor = new EditorPanel(Utils.$('#editor'), (content) => {
        preview.update(content);
        properties.setProperties(`Characters: ${content.length}`);
      });

      const preview = new PreviewPanel(Utils.$('#preview'));
      const properties = new PropertiesPane(Utils.$('#properties'));
      const relationshipForm = new RelationshipForm(Utils.$('#relationship-form'), (rel) => {
        alert(`Added relationship: ${rel}`);
      });

      // Initialize with first file
      editor.setValue('@startuml\nAlice -> Bob: Hello\n@enduml');
      preview.update(editor.getValue());
    });
  </script>
</body>
</html>
